<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Account — Rate My Rhythm</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f5ede0;
      --dark: #1a1208;
      --red: #c8371a;
      --orange: #e05c1a;
      --tan: #d4c4a8;
      --warm-white: #faf6ef;
      --groove: #2a1f10;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--cream);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,0,0,.04) 39px, rgba(0,0,0,.04) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,0,0,.04) 39px, rgba(0,0,0,.04) 40px);
    }

    .account-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      padding: 40px 16px;
    }

    .account-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .account-logo img {
      width: 90px;
      height: 90px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid var(--dark);
      box-shadow: 5px 5px 0 var(--red);
    }

    .account-logo .logo-text-small {
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--red);
      font-weight: 600;
    }

    .account-logo .logo-text-big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 38px;
      color: var(--dark);
      letter-spacing: 3px;
      line-height: 1;
      margin-top: -6px;
    }

    .account-card {
      background: var(--warm-white);
      border: 3px solid var(--dark);
      border-radius: 4px;
      width: 360px;
      max-width: 100%;
      padding: 36px 36px 28px;
      box-shadow: 6px 6px 0 var(--dark);
    }

    .account-card h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 3px;
      color: var(--dark);
      margin-bottom: 6px;
    }

    .account-card .sub {
      font-size: 11px;
      color: #888;
      margin-bottom: 24px;
      font-style: italic;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .account-card input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--dark);
      background: var(--cream);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      color: var(--dark);
      outline: none;
      border-radius: 0;
      transition: border-color .15s;
    }

    .account-card input:focus { border-color: var(--red); }

    .account-card input::placeholder { color: #aaa; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--dark);
      color: var(--cream);
      border: 2px solid var(--dark);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: background .15s, color .15s;
      margin-bottom: 8px;
    }

    .btn-primary:hover { background: var(--red); border-color: var(--red); }

    .btn-secondary {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: var(--dark);
      border: 2px solid var(--tan);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color .15s;
    }

    .btn-secondary:hover { border-color: var(--dark); }

    .divider {
      text-align: center;
      font-size: 11px;
      color: #aaa;
      margin: 14px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 36%;
      height: 1px;
      background: var(--tan);
    }

    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    #message {
      margin-top: 14px;
      font-size: 12px;
      text-align: center;
      color: var(--red);
      min-height: 18px;
      font-weight: 600;
    }

    .back-link {
      font-size: 11px;
      color: #888;
      text-decoration: none;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .15s;
    }

    .back-link:hover { color: var(--dark); }
  </style>
</head>
<body>

<div class="account-wrap">
  <a class="account-logo" href="index.html">
    <img src="cover-art/signin.jpg" alt="Rate My Rhythm Logo">
    <span class="logo-text-small">RATE MY</span>
    <span class="logo-text-big">RHYTHM</span>
  </a>

  <div class="account-card">
    <h2 id="formTitle">Sign In</h2>
    <p class="sub">Your personal record collection awaits.</p>

    <div class="field-group">
      <input type="text" id="username" placeholder="Username" autocomplete="username" aria-label="Username">
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" aria-label="Password">
    </div>

    <button class="btn-primary" onclick="login()">Login</button>
    <div class="divider">or</div>
    <button class="btn-secondary" onclick="signup()">Create Account</button>

    <p id="message" role="alert"></p>
  </div>

  <a class="back-link" href="index.html">← Back to Rate My Rhythm</a>
</div>

<script src="account.js"></script>
</body>
</html>
