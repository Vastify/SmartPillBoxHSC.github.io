<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Account — Rate My Rhythm</title>
  <link rel="icon" type="image/jpg" href="cover-art/favicon.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .account-page-wrap { display:flex; flex-direction:column; align-items:center; gap:24px; width:100%; padding:40px 16px; }
    .account-logo { display:flex; flex-direction:column; align-items:center; gap:10px; text-decoration:none; }
    .account-logo img { width:90px; height:90px; object-fit:cover; border-radius:50%; border:4px solid var(--dark); box-shadow:5px 5px 0 var(--red); }
    .account-logo .logo-text-small { font-size:11px; letter-spacing:4px; color:var(--red); font-weight:600; }
    .account-logo .logo-text-big { font-family:'Bebas Neue',sans-serif; font-size:38px; color:var(--dark); letter-spacing:3px; line-height:1; margin-top:-4px; }
    .account-card { background:var(--warm-white); border:3px solid var(--dark); border-radius:4px; width:360px; max-width:100%; padding:36px 36px 28px; box-shadow:6px 6px 0 var(--dark); }
    .account-card h2 { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:3px; color:var(--dark); margin-bottom:6px; }
    .account-card .sub { font-size:11px; color:#888; margin-bottom:24px; font-style:italic; }
    .account-card input { width:100%; padding:12px 14px; border:2px solid var(--dark); background:var(--cream); font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--dark); outline:none; border-radius:0; margin-bottom:12px; transition:border-color .15s; }
    .account-card input:focus { border-color:var(--red); }
    .account-card input::placeholder { color:#aaa; }
    #message { margin-top:14px; font-size:12px; text-align:center; color:var(--red); min-height:18px; font-weight:600; }
    .back-link { font-size:11px; color:#888; text-decoration:none; letter-spacing:1px; text-transform:uppercase; display:flex; align-items:center; gap:6px; transition:color .15s; }
    .back-link:hover { color:var(--dark); }
  </style>
</head>
<body>

<div class="account-page-wrap">
  <a class="account-logo" href="index.html">
    <img src="cover-art/signin.jpg" alt="Rate My Rhythm Logo">
    <span class="logo-text-small">RATE MY</span>
    <span class="logo-text-big">RHYTHM</span>
  </a>

  <div class="account-card">
    <h2>Sign In</h2>
    <p class="sub">Your personal record collection awaits.</p>
    <input type="text" id="username" placeholder="Username" autocomplete="username" aria-label="Username">
    <input type="password" id="password" placeholder="Password" autocomplete="current-password" aria-label="Password">
    <button class="btn-primary" onclick="login()">Login</button>
    <div class="divider">or</div>
    <button class="btn-secondary" onclick="signup()">Create Account</button>
    <p id="message" role="alert"></p>
  </div>

  <a class="back-link" href="index.html">← Back to Rate My Rhythm</a>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('rmr_user')) window.location.href = 'index.html';

  function signup() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    if (!u || !p) { document.getElementById('message').textContent = 'Please fill in all fields.'; return; }
    if (localStorage.getItem('rmr_pw_' + u)) { document.getElementById('message').textContent = 'Username already taken.'; return; }
    localStorage.setItem('rmr_pw_' + u, p);
    localStorage.setItem('rmr_user', u);
    window.location.href = 'index.html';
  }

  function login() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    if (!u || !p) { document.getElementById('message').textContent = 'Please fill in all fields.'; return; }
    const stored = localStorage.getItem('rmr_pw_' + u);
    if (stored === p) {
      localStorage.setItem('rmr_user', u);
      window.location.href = 'index.html';
    } else {
      document.getElementById('message').textContent = 'Incorrect username or password.';
    }
  }
</script>
</body>
</html>
