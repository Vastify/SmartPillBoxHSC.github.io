<!DOCTYPE html>
<html>
<head> 
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rate My Rhythm</title>
    <link rel="icon" type="image/jpg" href="cover-art/favicon.jpg">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/4c4e9f3b3f.js" crossorigin="anonymous"></script>
</head>

<body>

<!-- TOP of HEADER -->
<header class="top-header">

    <div class="logo">
        <img src="logo.jpg" alt="Rate My Rhythm Logo">
        <div class="logo-text">
            <span class="small">RATE MY</span>
            <span class="big">RHYTHM</span>
        </div>
    </div>

    <div class="search-container">
        <form action="/search-results" method="GET">
            <input type="search" name="q" placeholder="Search music...">
            <button type="submit"><i class="fa fa-search"></i></button>
        </form>
    </div>

    <div class="account" id="accountBtn">
        <img src="cover-art/signin.jpg" alt="Account Icon" class="account-icon">
    </div>

</header>

<!-- NAV RIBBON -->
<nav class="nav-bar">

    <div class="nav-left"></div>

    <div class="nav-content">
        <ul class="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="genres.html">Genres</a></li>
            <li><a href="artists.html">Artists</a></li>
            <li class="highlight">Music Reviews For the Fans, By the Fans</li>
            <li><a href="top_rated.html">Top Rated</a></li>
            <li><a href="submit_comment.html">Submit a Comment</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </div>

    <div class="nav-right"></div>

</nav>

<div class="sort-toolbar">
    <label for="sortSelect">Sort by:</label>
    <select id="sortSelect" onchange="handleSortChange(event)">
        <option value="scoreHigh">Score (high)</option>
        <option value="scoreLow">Score (low)</option>
        <option value="artist">Artist</option>
        <option value="genre">Genres</option>
        <option value="reviews">Reviews</option>
        <option value="comments">Comments</option>
    </select>
</div>

<section class="album-search-section" aria-labelledby="albumSearchTitle">
    <div class="album-search-header">
        <div>
            <h2 id="albumSearchTitle">Find Albums</h2>
            <p>Search iTunes albums by artist or album name.</p>
        </div>
        <form id="albumSearchForm" class="album-search-form">
            <input id="albumSearchInput" type="search" placeholder="Search albums...">
            <button type="submit"><i class="fa fa-search"></i></button>
        </form>
    </div>
    <p id="albumStatus" class="album-status">Loading albums...</p>
    <div id="albumsGrid" class="albums-grid" aria-live="polite"></div>
</section>

<section id="albumDetailSection" class="album-detail-section" aria-live="polite" hidden>
    <button id="backToAlbumsBtn" class="back-to-albums" type="button"><i class="fa fa-arrow-left"></i> Back to albums</button>
    <div id="albumDetail" class="album-detail"></div>
</section>

<!-- PAGE HERO / INTRO -->
<section class="flex-container">
    <div class="text-container">
        <h1>Welcome to Rate My Rhythm!</h1>
        <p>Stream New "ICEMAN" & Drake's New 3 Albums Now!.</p>
    </div>
</section>

<script>
function handleSortChange(event) {
    const value = event.target.value;
    sortAlbums(value);
}

const albumSearchForm = document.getElementById('albumSearchForm');
const albumSearchInput = document.getElementById('albumSearchInput');
const albumsGrid = document.getElementById('albumsGrid');
const albumStatus = document.getElementById('albumStatus');
const sortSelect = document.getElementById('sortSelect');
const sortToolbar = document.querySelector('.sort-toolbar');
const albumSearchSection = document.querySelector('.album-search-section');
const albumDetailSection = document.getElementById('albumDetailSection');
const albumDetail = document.getElementById('albumDetail');
const backToAlbumsBtn = document.getElementById('backToAlbumsBtn');
const defaultAlbumSearches = ['Michael Jackson Thriller', 'Kanye West Graduation', 'SZA SOS', 'Sampha Process'];
let currentAlbums = [];
let albumPreviewAudio = new Audio();
let activePreviewTrackId = null;
let activePlayButton = null;

function getAlbumRating(album) {
    const ratingSeed = String(album.collectionId || album.collectionName)
        .split('')
        .reduce((total, character) => total + character.charCodeAt(0), 0);
    return (7 + (ratingSeed % 31) / 10).toFixed(1);
}

function getLargeArtwork(artworkUrl) {
    return artworkUrl ? artworkUrl.replace('100x100bb', '600x600bb') : '';
}

function renderAlbums(albums) {
    currentAlbums = albums.map((album) => ({
        ...album,
        rating: album.rating || getAlbumRating(album)
    }));
    albumsGrid.innerHTML = '';

    if (!currentAlbums.length) {
        albumStatus.textContent = 'No albums found. Try another search.';
        return;
    }

    albumStatus.textContent = '';

    currentAlbums.forEach((album) => {
        const card = document.createElement('article');
        card.className = 'album-card';
        card.tabIndex = 0;
        card.setAttribute('role', 'button');
        card.setAttribute('aria-label', 'Open ' + album.collectionName + ' by ' + album.artistName);

        const artwork = document.createElement('img');
        artwork.className = 'album-art';
        artwork.src = getLargeArtwork(album.artworkUrl100);
        artwork.alt = album.collectionName + ' album cover';

        const title = document.createElement('h3');
        title.textContent = album.collectionName;

        const artist = document.createElement('p');
        artist.className = 'album-artist';
        artist.textContent = album.artistName;

        const genre = document.createElement('p');
        genre.className = 'album-genre';
        genre.textContent = 'Genre: ' + (album.primaryGenreName || 'Unknown');

        const rating = document.createElement('p');
        rating.className = 'album-rating';
        rating.textContent = 'Rating: ' + album.rating + '/10';

        card.append(artwork, title, artist, genre, rating);
        card.addEventListener('click', () => openAlbumDetail(album.collectionId));
        card.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                openAlbumDetail(album.collectionId);
            }
        });
        albumsGrid.appendChild(card);
    });
}

function sortAlbums(sortValue) {
    if (!currentAlbums.length) return;

    const sortedAlbums = [...currentAlbums].sort((firstAlbum, secondAlbum) => {
        if (sortValue === 'scoreLow') return firstAlbum.rating - secondAlbum.rating;
        if (sortValue === 'artist') return firstAlbum.artistName.localeCompare(secondAlbum.artistName);
        if (sortValue === 'genre') return (firstAlbum.primaryGenreName || '').localeCompare(secondAlbum.primaryGenreName || '');
        return secondAlbum.rating - firstAlbum.rating;
    });

    renderAlbums(sortedAlbums);
}

async function getDefaultAlbums() {
    // 1. cant find latest albums so i just put drakes latezt 3 albums here as a placeholder for now
    const drakeRes = await fetch('https://itunes.apple.com/search?term=drake&entity=album&limit=10');
    let drakeAlbums = [];
    if (drakeRes.ok) {
        const drakeData = await drakeRes.json();
        drakeAlbums = (drakeData.results || [])
            .filter(a => a.artistName.toLowerCase() === 'drake')
            .sort((a, b) => new Date(b.releaseDate) - new Date(a.releaseDate))
            .slice(0, 3)
            .map(album => ({
                collectionId: album.collectionId,
                collectionName: album.collectionName,
                artistName: album.artistName,
                artworkUrl100: album.artworkUrl100,
                primaryGenreName: album.primaryGenreName || 'Unknown'
            }));
    }

    // 2. attempt to get 7 more latest albums (did not work lul)
    const rssRes = await fetch('https://itunes.apple.com/us/rss/newalbums/limit=7/json');
    let rssAlbums = [];
    if (rssRes.ok) {
        const rssData = await rssRes.json();
        rssAlbums = (rssData.feed.entry || []).map(entry => ({
            collectionId: entry.id.attributes['im:id'],
            collectionName: entry['im:name'].label,
            artistName: entry['im:artist'].label,
            artworkUrl100: entry['im:image'][entry['im:image'].length - 1].label,
            primaryGenreName: entry.category?.attributes?.label || 'Unknown'
        }));
    }

    const allAlbums = [...drakeAlbums, ...rssAlbums];
    const uniqueAlbums = [];
    const seen = new Set();
    for (const album of allAlbums) {
        if (!seen.has(album.collectionId)) {
            uniqueAlbums.push(album);
            seen.add(album.collectionId);
        }
    }
    return uniqueAlbums;
}

async function searchAlbums(query) {
    const searchTerm = query.trim();

    albumStatus.textContent = 'Loading albums...';
    albumsGrid.innerHTML = '';

    try {
        if (!searchTerm) {
            const defaultAlbums = await getDefaultAlbums();
            renderAlbums(defaultAlbums);
            sortAlbums(sortSelect.value);
            albumStatus.textContent = defaultAlbums.length ? 'Showing latest albums.' : 'No latest albums found.';
            return;
        }

        const response = await fetch('https://itunes.apple.com/search?entity=album&limit=12&term=' + encodeURIComponent(searchTerm));
        if (!response.ok) throw new Error('iTunes request failed');
        const data = await response.json();
        renderAlbums(data.results || []);
        sortAlbums(sortSelect.value);
    } catch (error) {
        albumStatus.textContent = 'Could not load albums right now. Please try again soon.';
    }
}

function getRatingLabel(rating) {
    if (rating >= 9.5) return 'Perfect Score';
    if (rating >= 9) return 'Amazing';
    if (rating >= 8) return 'Great';
    return 'Solid';
}

function getTrackDuration(milliseconds) {
    if (!milliseconds) return '';

    const minutes = Math.floor(milliseconds / 60000);
    const seconds = Math.floor((milliseconds % 60000) / 1000);
    return minutes + ':' + String(seconds).padStart(2, '0');
}

function getHighlightTrack(tracks) {
    return tracks.find((track) => /billie jean/i.test(track.trackName)) || tracks.find((track) => track.previewUrl) || tracks[0];
}

function showAlbumList() {
    pausePreview();
    albumDetailSection.hidden = true;
    albumSearchSection.hidden = false;
    sortToolbar.hidden = false;
}

function pausePreview() {
    albumPreviewAudio.pause();

    if (activePlayButton) {
        activePlayButton.innerHTML = '<i class="fa fa-play"></i>';
        activePlayButton.setAttribute('aria-label', 'Play preview');
    }
}

function renderAlbumDetail(album, tracks) {
    pausePreview();
    activePreviewTrackId = null;

    const previewTracks = tracks.filter((track) => track.previewUrl);
    const highlightTrack = getHighlightTrack(previewTracks.length ? previewTracks : tracks);
    const rating = Number(album.rating);
    const ratingLabel = getRatingLabel(rating);
    let selectedTrack = highlightTrack;
    let activeTrackButton = null;

    albumDetail.innerHTML = '';

    const artworkPanel = document.createElement('div');
    artworkPanel.className = 'album-detail-art-panel';

    const artwork = document.createElement('img');
    artwork.className = 'album-detail-art';
    artwork.src = getLargeArtwork(album.artworkUrl100);
    artwork.alt = album.collectionName + ' album cover';

    const albumInfo = document.createElement('div');
    albumInfo.className = 'album-detail-info';

    const detailTitle = document.createElement('h2');
    detailTitle.textContent = album.collectionName;

    const detailArtist = document.createElement('p');
    detailArtist.textContent = album.artistName;

    albumInfo.append(detailTitle, detailArtist);

    const scoreBadge = document.createElement('div');
    scoreBadge.className = 'score-badge';
    scoreBadge.textContent = rating.toFixed(1);

    const scoreLabel = document.createElement('p');
    scoreLabel.className = 'score-label';
    scoreLabel.textContent = ratingLabel;

    artworkPanel.append(artwork, albumInfo, scoreBadge, scoreLabel);

    const tracksPanel = document.createElement('div');
    tracksPanel.className = 'track-panel';

    const playIcon = document.createElement('button');
    playIcon.className = 'play-button';
    playIcon.type = 'button';
    playIcon.setAttribute('aria-label', 'Play preview');
    playIcon.innerHTML = '<i class="fa fa-play"></i>';
    activePlayButton = playIcon;

    const trackTitle = document.createElement('h3');
    trackTitle.textContent = 'Track list';

    const trackList = document.createElement('ol');
    trackList.className = 'track-list';

    tracks.slice(0, 10).forEach((track) => {
        const trackItem = document.createElement('li');
        const trackButton = document.createElement('button');
        const duration = getTrackDuration(track.trackTimeMillis);

        trackButton.type = 'button';
        trackButton.className = 'track-button';
        trackButton.disabled = !track.previewUrl;
        trackButton.setAttribute('aria-label', track.previewUrl ? 'Play ' + track.trackName : track.trackName + ' has no preview');

        const trackName = document.createElement('span');
        trackName.className = 'track-name';
        trackName.textContent = track.trackName;

        const trackMeta = document.createElement('span');
        trackMeta.className = 'track-meta';
        trackMeta.textContent = duration || (track.previewUrl ? 'Preview' : 'No preview');
        trackMeta.dataset.defaultText = trackMeta.textContent;

        trackButton.append(trackName, trackMeta);

        if (highlightTrack && track.trackId === highlightTrack.trackId) {
            activeTrackButton = trackButton;
            trackButton.classList.add('is-highlight-track');
        }

        trackButton.addEventListener('click', () => {
            selectedTrack = track;
            setActiveTrack(trackButton, track);
            togglePreview(track);
        });

        trackItem.appendChild(trackButton);
        trackList.appendChild(trackItem);
    });

    const highlight = document.createElement('p');
    highlight.className = 'highlight-track';
    highlight.textContent = 'Highlight Track: ';

    const highlightName = document.createElement('span');
    highlightName.textContent = highlightTrack ? highlightTrack.trackName : 'No track found';
    highlight.appendChild(highlightName);

    const commentButton = document.createElement('button');
    commentButton.className = 'comment-button';
    commentButton.type = 'button';
    commentButton.setAttribute('aria-label', 'Comment on album');
    commentButton.innerHTML = '<i class="fa fa-comment-dots"></i>';
    commentButton.addEventListener('click', () => {
        window.location.href = 'submit_comment.html';
    });

    playIcon.addEventListener('click', () => {
        togglePreview(selectedTrack);
    });

    tracksPanel.append(playIcon, trackTitle, trackList, highlight, commentButton);
    albumDetail.append(artworkPanel, tracksPanel);

    setActiveTrack(activeTrackButton, selectedTrack);

    function setActiveTrack(trackButton, track) {
        trackList.querySelectorAll('.track-meta').forEach((meta) => {
            meta.textContent = meta.dataset.defaultText;
        });

        if (activeTrackButton) activeTrackButton.classList.remove('is-highlight-track');
        activeTrackButton = trackButton;

        if (activeTrackButton) {
            activeTrackButton.classList.add('is-highlight-track');
            const activeMeta = activeTrackButton.querySelector('.track-meta');
            if (activeMeta && track && track.previewUrl) activeMeta.textContent = 'Now Playing';
        }

        selectedTrack = track;
        highlightName.textContent = selectedTrack ? selectedTrack.trackName : 'No track found';

        if (!selectedTrack || !selectedTrack.previewUrl) {
            pausePreview();
            playIcon.disabled = true;
            playIcon.setAttribute('aria-label', 'No preview available');
            return;
        }

        playIcon.disabled = false;
        playIcon.setAttribute('aria-label', 'Play preview for ' + selectedTrack.trackName);
    }

    function togglePreview(track) {
        if (!track || !track.previewUrl) return;

        if (activePreviewTrackId === track.trackId && !albumPreviewAudio.paused) {
            pausePreview();
            return;
        }

        if (activePreviewTrackId !== track.trackId) {
            albumPreviewAudio.pause();
            albumPreviewAudio = new Audio(track.previewUrl);
            activePreviewTrackId = track.trackId;
            albumPreviewAudio.addEventListener('ended', () => {
                activePreviewTrackId = null;
                albumPreviewAudio.currentTime = 0;
                pausePreview();
            }, { once: true });
        }

        if (albumPreviewAudio.ended) albumPreviewAudio.currentTime = 0;
        albumPreviewAudio.play();
        playIcon.innerHTML = '<i class="fa fa-pause"></i>';
        playIcon.setAttribute('aria-label', 'Pause preview for ' + track.trackName);
    }
}

async function openAlbumDetail(collectionId) {
    const album = currentAlbums.find((item) => item.collectionId === collectionId);
    if (!album) return;

    pausePreview();
    albumSearchSection.hidden = true;
    sortToolbar.hidden = true;
    albumDetailSection.hidden = false;
    albumDetail.innerHTML = '<p class="album-status">Loading album...</p>';

    try {
        const response = await fetch('https://itunes.apple.com/lookup?id=' + encodeURIComponent(collectionId) + '&entity=song');
        if (!response.ok) throw new Error('Track lookup failed');

        const data = await response.json();
        const tracks = (data.results || []).filter((item) => item.wrapperType === 'track');
        renderAlbumDetail(album, tracks);
        albumDetailSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch (error) {
        albumDetail.innerHTML = '<p class="album-status">Could not load this album right now.</p>';
    }
}

albumSearchForm.addEventListener('submit', (event) => {
    event.preventDefault();
    searchAlbums(albumSearchInput.value);
});

backToAlbumsBtn.addEventListener('click', showAlbumList);

searchAlbums('');
</script>
<script src="account.js"></script>
</body>
</html>
